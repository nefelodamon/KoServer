<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block title %}KoServer{% endblock %}</title>
  <link rel="stylesheet" href="/static/style.css" />
</head>
<body>
  <nav class="sidebar">
    <div class="sidebar-logo">
      <span class="sidebar-icon">📚</span>
      <span class="sidebar-name">KoServer</span>
    </div>
    <ul class="sidebar-nav">
      <li>
        <a href="/services/kobooks" class="nav-link {% block nav_kobooks %}{% endblock %}">
          <span class="nav-icon">🔖</span> KoBooks
        </a>
      </li>
      {# Future services inserted here #}
    </ul>
    <div class="sidebar-footer">
      <a href="/logout" class="nav-link">
        <span class="nav-icon">🚪</span> Sign out
      </a>
    </div>
  </nav>

  <main class="content">
    {% block content %}{% endblock %}
  </main>

  <script src="/static/app.js"></script>
  {% block scripts %}{% endblock %}
</body>
</html>
