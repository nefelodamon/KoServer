{% set root = request.scope.get("root_path", "").rstrip("/") %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block title %}KoServer{% endblock %}</title>
  <link rel="stylesheet" href="{{ root }}/static/style.css" />
</head>
<body>
  <nav class="sidebar">
    <div class="sidebar-logo">
      <span class="sidebar-icon">📚</span>
      <span class="sidebar-name">KoServer</span>
    </div>
    <ul class="sidebar-nav">
      <li>
        <a href="{{ root }}/services/kocharacters" class="nav-link {% block nav_kocharacters %}{% endblock %}">
          <span class="nav-icon">🔖</span> KoCharacters
        </a>
      </li>
      <li>
        <a href="{{ root }}/services/kocharacters/settings" class="nav-link nav-sub {% block nav_kocharacters_settings %}{% endblock %}">
          <span class="nav-icon">⚙️</span> Settings
        </a>
      </li>
      <li>
        <a href="{{ root }}/services/kosync" class="nav-link {% block nav_kosync %}{% endblock %}">
          <span class="nav-icon">🔄</span> KoSync
        </a>
      </li>
      <li>
        <a href="{{ root }}/services/kosync/settings" class="nav-link nav-sub {% block nav_kosync_settings %}{% endblock %}">
          <span class="nav-icon">⚙️</span> Settings
        </a>
      </li>
      {# Future services inserted here #}
    </ul>
    <div class="sidebar-footer">
      <a href="{{ root }}/logout" class="nav-link">
        <span class="nav-icon">🚪</span> Sign out
      </a>
    </div>
  </nav>

  <main class="content">
    {% block content %}{% endblock %}
  </main>

  <script src="{{ root }}/static/app.js"></script>
  {% block scripts %}{% endblock %}
</body>
</html>
