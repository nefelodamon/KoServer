name: KoServer
version: "0.1.6"
slug: koserver
description: Host for various services including KoBooks (KOReader character viewer)
url: https://github.com/nefelodamon/KoServer
arch:
  - aarch64
  - amd64
  - armhf
  - armv7
  - i386

startup: application
boot: auto

ingress: true
ingress_port: 8099
panel_icon: mdi:bookshelf

ports:
  8099/tcp: 8099
ports_description:
  8099/tcp: Web UI and API

options:
  api_key: ""
  ha_url: "https://homeassistant:8123"

schema:
  api_key: str
  ha_url: str

map:
  - data:rw
